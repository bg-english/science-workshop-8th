// ─── Helpers ──────────────────────────────────────────────
const scoreTheme = (questions, answers) =>
  questions.reduce((s,q) => {
    if(q.type==="mc")  return s + (answers[q.id]===q.ans ? q.pts : 0);
    if(q.type==="fill") return s + ((answers[q.id]||"").trim().toLowerCase()===q.ans.toLowerCase() ? q.pts : 0);
    if(q.type==="open"){
      const len=(answers[q.id]||"").trim().length;
      return s + (len>40?q.pts:len>10?Math.floor(q.pts*.6):0);
    }
    return s;
  }, 0);

async function sendToTelegram(blob, studentName, grade) {
  if(!TELEGRAM_BOT_TOKEN || !TELEGRAM_CHAT_ID) return {ok:false, reason:"not_configured"};
  try {
    const form = new FormData();
    form.append("chat_id", TELEGRAM_CHAT_ID);
    form.append("document", blob, `Science_Workshop_${studentName.replace(/\s+/g,"_")}.pdf`);
    form.append("caption", `📚 *Science Workshop PDF*\n👤 ${studentName}\n🏫 ${grade}\n📅 ${new Date().toLocaleDateString("es-AR")}`);
    form.append("parse_mode","Markdown");
    const res = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument`,{method:"POST",body:form});
    const data = await res.json();
    return {ok:data.ok, reason:data.ok?"sent":data.description};
  } catch(e) {
    return {ok:false, reason:e.message};
  }
}

// Strip characters outside Latin-1 (unsupported by standard PDF fonts)
const pdfSafe = (str) => String(str || "")
  .replace(/\u2014|\u2013/g, "-")   // em/en dash → hyphen
  .replace(/[\u2018\u2019]/g, "'")  // curly single quotes → straight
  .replace(/[\u201C\u201D]/g, '"')  // curly double quotes → straight
  .replace(/[^\x00-\xFF]/g, "")     // strip anything else outside Latin-1
  .replace(/ {2,}/g, " ");          // collapse double spaces

function generatePDF(name, grade, answers, scores) {
  if(!window.jspdf) throw new Error("jsPDF not loaded. Check internet connection.");
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:"pt", format:"a4"});
  const W=595, M=40, CW=W-2*M;
  let y=M;
  const nl=(h)=>{ if(y+h>800){doc.addPage();y=M;} };
  // Safe text helper — strips unsupported Unicode before rendering
  const t = (str, x, yPos, opts) => doc.text(pdfSafe(str), x, yPos, opts||{});
  const split = (str, w) => doc.splitTextToSize(pdfSafe(str), w);

  // Cover page
  doc.setFillColor(28,25,23);
  doc.rect(0,0,W,842,"F");
  doc.setFillColor(22,101,52);
  doc.rect(0,355,W,6,"F");
  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","bold");
  doc.setFontSize(34);
  t("8th Grade Science",W/2,180,{align:"center"});
  doc.setFontSize(16);
  doc.setFont("helvetica","normal");
  t("Final Workshop - 1st Term 2026",W/2,218,{align:"center"});
  doc.setFontSize(14);
  t(`Student: ${name}`,W/2,400,{align:"center"});
  t(`Grade: ${grade}`,W/2,424,{align:"center"});
  t(`Date: ${new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})}`,W/2,448,{align:"center"});
  const total = scores.reduce((a,b)=>a+b,0);
  const pct = Math.round(total/TOTAL_PTS*100);
  doc.setFontSize(26);
  doc.setFont("helvetica","bold");
  doc.setTextColor(34,197,94);
  t(`Score: ${total} / ${TOTAL_PTS}`,W/2,520,{align:"center"});
  doc.setFontSize(13);
  doc.setFont("helvetica","normal");
  doc.setTextColor(180,180,180);
  t(`${pct}% - ${pct>=90?"Outstanding!":pct>=75?"Great work!":pct>=60?"Good effort!":"Keep studying!"}`,W/2,548,{align:"center"});
  doc.setFontSize(10);
  doc.setTextColor(120,120,120);
  t("Colegio Boston Flexible - ClassroomsOS",W/2,778,{align:"center"});
  t('"Year of Purity" - Genesis 1:27-28a TLA',W/2,796,{align:"center"});

  const themeColors=[[22,101,52],[67,56,202],[180,83,9]];
  const themeNames=["THEME 1: Healthy Diet & Nutrition","THEME 2: Central Nervous System","THEME 3: Soft Skills for Life"];
  const themeVerses=["1 Corinthians 6:19","1 Corinthians 12:26-27","1 Timothy 3:5"];

  WORKSHOP.forEach((qs, ti) => {
    doc.addPage();
    doc.setFillColor(...themeColors[ti]);
    doc.rect(0,0,W,70,"F");
    doc.setTextColor(255,255,255);
    doc.setFontSize(16);
    doc.setFont("helvetica","bold");
    t(themeNames[ti],W/2,28,{align:"center"});
    doc.setFontSize(10);
    doc.setFont("helvetica","normal");
    t(`Biblical Principle: ${themeVerses[ti]}`,W/2,46,{align:"center"});
    t(`Score: ${scores[ti]} points`,W/2,62,{align:"center"});
    y=90;

    // Brain image for theme 1 (fully optional — skipped if unavailable)
    if(ti===1) {
      try {
        const imgEl = document.getElementById("img-brain-pdf");
        if(imgEl && imgEl.complete && imgEl.naturalWidth>0) {
          doc.addImage(imgEl,"JPEG",M+60,y,CW-120,160);
          y+=175;
        }
      } catch(e){ /* skip image silently */ }
    }

    qs.forEach(q => {
      nl(80);
      doc.setFontSize(11);
      doc.setFont("helvetica","bold");
      doc.setTextColor(28,25,23);
      split(q.q, CW-10).forEach(line=>{nl(16);t(line,M+5,y+12);y+=15;});
      doc.setFont("helvetica","normal");
      doc.setFontSize(10);
      y+=4;
      const ans = answers[q.id];
      if(q.type==="mc"){
        const chosen=typeof ans==="number"?q.opts[ans]:"(not answered)";
        const correct=q.opts[q.ans];
        const ok=ans===q.ans;
        doc.setTextColor(ok?22:200,ok?101:50,ok?52:50);
        t(`${ok?"[CORRECT]":"[WRONG]"} Your answer: ${chosen}`,M+10,y+10);y+=16;
        if(!ok){doc.setTextColor(22,101,52);t(`  Correct answer: ${correct}`,M+10,y+10);y+=16;}
      } else if(q.type==="fill"){
        const ok=(ans||"").trim().toLowerCase()===q.ans.toLowerCase();
        doc.setTextColor(ok?22:200,ok?101:50,ok?52:50);
        t(`${ok?"[CORRECT]":"[WRONG]"} Your answer: ${ans||"(blank)"}`,M+10,y+10);y+=16;
        if(!ok){doc.setTextColor(22,101,52);t(`  Correct answer: ${q.ans}`,M+10,y+10);y+=16;}
      } else {
        doc.setTextColor(50,50,50);
        split(ans||"(not answered)",CW-20).forEach(line=>{nl(14);t(line,M+10,y+10);y+=14;});
      }
      doc.setTextColor(150,150,150);
      doc.setFontSize(9);
      t(`[${q.pts} pts]`,W-M,y+4,{align:"right"});
      y+=16;
      doc.setDrawColor(230,230,230);
      doc.line(M,y,W-M,y);
      y+=10;
    });
  });

  // Final page
  doc.addPage();
  doc.setFillColor(28,25,23);
  doc.rect(0,0,W,842,"F");
  doc.setTextColor(255,255,255);
  doc.setFontSize(24);
  doc.setFont("helvetica","bold");
  t("Workshop Complete!",W/2,250,{align:"center"});
  doc.setFontSize(14);
  doc.setFont("helvetica","normal");
  t(`${name} - ${grade}`,W/2,290,{align:"center"});
  doc.setFontSize(30);
  doc.setTextColor(34,197,94);
  t(`${total} / ${TOTAL_PTS} (${pct}%)`,W/2,350,{align:"center"});
  doc.setFontSize(11);
  doc.setTextColor(180,180,180);
  t("Send this PDF to Prof. Ortiz as evidence of completion.",W/2,410,{align:"center"});
  doc.setTextColor(100,100,100);
  doc.setFontSize(9);
  t("1 Cor 6:19 - 1 Cor 12:26-27 - 1 Tim 3:5",W/2,500,{align:"center"});
  return doc;
}

function MatchingActivity({act, onComplete}) {
  const [sel, setSel] = useState({});
  const [checked, setChecked] = useState(false);
  const [hint, setHint] = useState(false);
  const leftItems = act.left;
  const rightItems = [...act.right].sort(()=>Math.random()-.5);
  const [shuffled] = useState(rightItems);
  const allDone = leftItems.every(l=>sel[l]);

  const check = () => {
    setChecked(true);
    if(leftItems.every(l=>sel[l]===act.correct[l])) setTimeout(()=>onComplete(true),600);
  };
  return html`<div>
    ${hint&&html`<div style=${{padding:"10px 14px",background:"#fef9c3",borderRadius:8,fontSize:12,color:"#854d0e",marginBottom:12,borderLeft:"3px solid #eab308"}}>💡 ${act.hint}</div>`}
    <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
      <div>
        <p style=${{fontSize:10,fontWeight:700,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Match from here</p>
        ${leftItems.map(l=>{
          const ok=checked&&sel[l]===act.correct[l], bad=checked&&sel[l]&&sel[l]!==act.correct[l];
          return html`<div key=${l} onClick=${()=>!checked&&setSel(p=>({...p,[l]:null}))}
            style=${{padding:"8px 10px",marginBottom:4,borderRadius:8,border:ok?"2px solid #16a34a":bad?"2px solid #dc2626":sel[l]?"2px solid #4338ca":"1.5px solid #ddd",background:ok?"#dcfce7":bad?"#fee2e2":sel[l]?"#eef2ff":"#fff",fontSize:12,fontWeight:600,cursor:"default"}}>
            ${ok?"✅ ":bad?"❌ ":""} ${l}
            ${sel[l]&&html`<span style=${{display:"block",fontSize:10,color:"#666",fontWeight:400}}>→ ${sel[l]}</span>`}
          </div>`;
        })}
      </div>
      <div>
        <p style=${{fontSize:10,fontWeight:700,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>…to here</p>
        ${shuffled.map(r=>{
          const used=Object.values(sel).includes(r);
          const nextLeft=leftItems.find(l=>!sel[l]);
          return html`<div key=${r} onClick=${()=>{if(checked||used||!nextLeft)return;setSel(p=>({...p,[nextLeft]:r}));}}
            style=${{padding:"8px 10px",marginBottom:4,borderRadius:8,border:used?"1.5px solid #ddd":"1.5px solid #a78bfa",background:used?"#f5f5f4":"#f5f3ff",fontSize:12,cursor:checked||used||!nextLeft?"default":"pointer",opacity:used?.5:1}}>
            ${r}
          </div>`;
        })}
      </div>
    </div>
    <div style=${{display:"flex",gap:8,flexWrap:"wrap"}}>
      <button onClick=${()=>setHint(true)} style=${{padding:"8px 16px",background:"#fef9c3",border:"1px solid #eab308",borderRadius:8,fontSize:12,color:"#854d0e"}}>💡 Hint</button>
      <button onClick=${()=>{setSel({});setChecked(false);}} style=${{padding:"8px 16px",background:"#f5f5f4",border:"1px solid #ddd",borderRadius:8,fontSize:12,color:"#666"}}>↺ Reset</button>
      ${allDone&&!checked&&html`<button onClick=${check} style=${{padding:"8px 20px",background:"#166534",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:600}}>Check Answers</button>`}
    </div>
  </div>`;
}

function SortActivity({act, onComplete}) {
  const [choices, setChoices] = useState({});
  const [checked, setChecked] = useState(false);
  const [hint, setHint] = useState(false);
  const allDone = Object.keys(choices).length===act.items.length;
  const check = () => {
    setChecked(true);
    if(act.items.every(item=>choices[item.text]===item.ans)) setTimeout(()=>onComplete(true),600);
  };
  return html`<div>
    ${hint&&html`<div style=${{padding:"10px 14px",background:"#fef9c3",borderRadius:8,fontSize:12,color:"#854d0e",marginBottom:12,borderLeft:"3px solid #eab308"}}>💡 ${act.hint}</div>`}

      ${act.items.map(item=>{

        return html`<div key=${item.text} style=${{display:"flex",alignItems:"center",gap:6,padding:"8px 10px",background:ok?"#dcfce7":bad?"#fee2e2":"#fff",border:"1.5px solid #ddd",borderRadius:8}}>

          <button onClick=${()=>!checked&&setChoices(p=>({...p,[item.text]:"Soft"}))}
            style=${{padding:"4px 8px",fontSize:10,border:choices[item.text]==="Soft"?"2px solid #b45309":"1px solid #ccc",borderRadius:5,background:choices[item.text]==="Soft"?"#fef3c7":"#fff",fontWeight:choices[item.text]==="Soft"?700:400,cursor:checked?"default":"pointer"}}>Soft</button>
          <button onClick=${()=>!checked&&setChoices(p=>({...p,[item.text]:"Hard"}))}
            style=${{padding:"4px 8px",fontSize:10,border:choices[item.text]==="Hard"?"2px solid #4338ca":"1px solid #ccc",borderRadius:5,background:choices[item.text]==="Hard"?"#e0e7ff":"#fff",fontWeight:choices[item.text]==="Hard"?700:400,cursor:checked?"default":"pointer"}}>Hard</button>

function ResultsScreen({name, grade, pdfBlob, scores, onRetry, telegramStatus}) {
  const total=scores.reduce((a,b)=>a+b,0);
  const pct=Math.round(total/TOTAL_PTS*100);

  const download = () => {
    // Cross-platform PDF download
    const { jsPDF } = window.jspdf;
    const filename = `Science_Workshop_${name.replace(/\s+/g,"_")}.pdf`;
    // Use jsPDF's built-in save which handles iOS, Android, Windows
    const url = URL.createObjectURL(pdfBlob);
    const isIOS = /ipad|iphone|ipod/i.test(navigator.userAgent) && !window.MSStream;
    if(isIOS) {
      // iOS: open in new tab (user can then share/save from browser)
      window.open(url, "_blank");
    } else {
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 5000);
    }
  };

  return html`<div class="fade-in" style=${{textAlign:"center",padding:"40px 20px"}}>
    <div style=${{fontSize:56,marginBottom:12}}>🎉</div>

    </div>
    ${pdfBlob&&html`<div style=${{marginBottom:16}}>
      <button onClick=${download}
        style=${{display:"block",width:"100%",padding:"16px 40px",background:"#166534",color:"#fff",borderRadius:12,fontSize:16,fontWeight:700,border:"none",boxShadow:"0 4px 12px rgba(22,101,52,.3)",marginBottom:8}}>

        <p style=${{color:"#78716c",fontSize:11,marginBottom:32,fontStyle:"italic"}}>Learn · Practice · Reflect · Be Evaluated</p>

        <div style=${{background:"rgba(255,255,255,.05)",borderRadius:16,padding:"28px 24px",border:"1px solid rgba(255,255,255,.08)"}}>
          <p style=${{color:"#a8a29e",fontSize:13,marginBottom:16,textAlign:"left"}}>Enter your school email to access the workshop:</p>

          <div style=${{position:"relative",marginBottom:12}}>
            <input
              value=${email}
              onChange=${e=>lookup(e.target.value)}
              onKeyDown=${e=>e.key==="Enter"&&submit()}
              placeholder="yourname@redboston.edu.co"
              type="email"
              autocomplete="email"
              style=${{
                width:"100%", padding:"14px 16px",
                border: found ? "1.5px solid #22c55e" : error ? "1.5px solid #ef4444" : "1.5px solid rgba(255,255,255,.12)",
                borderRadius:10, fontSize:14,
                background:"rgba(255,255,255,.06)", color:"#fafaf9",
                outline:"none", boxSizing:"border-box", fontFamily:C.sans,
                transition:"border .2s"
              }}/>
            ${found && html`<span style=${{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",fontSize:18}}>✅</span>`}
          </div>

          ${found && html`
            <div style=${{background:"rgba(34,197,94,.12)",border:"1px solid rgba(34,197,94,.3)",borderRadius:10,padding:"14px 16px",marginBottom:16,textAlign:"left"}}>
              <p style=${{color:"#4ade80",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Welcome!</p>
              <p style=${{color:"#fafaf9",fontSize:15,fontWeight:700,marginBottom:2}}>${found.name}</p>
              <p style=${{color:"#a8a29e",fontSize:13}}>${found.grade}</p>
            </div>
          `}

          ${error && html`
            <div style=${{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:10,padding:"12px 14px",marginBottom:12,textAlign:"left"}}>
              <p style=${{color:"#fca5a5",fontSize:13}}>⚠️ ${error}</p>
            </div>
          `}

          <button
            onClick=${submit}
            disabled=${!found}
            style=${{
              width:"100%", padding:"14px 0",
              background: found ? "#166534" : "rgba(255,255,255,.08)",
              color: found ? "#fff" : "#57534e",
              border:"none", borderRadius:10, fontSize:15, fontWeight:700,
              letterSpacing:.5, transition:"all .2s",
              cursor: found ? "pointer" : "default"
            }}>
            ${found ? "Begin Workshop →" : "Enter your email to continue"}
          </button>
        </div>

        <p style=${{color:"#3d3836",fontSize:10,marginTop:24}}>Colegio Boston Flexible · ClassroomsOS</p>
      </div>
    </div>`;
}

// ─── Main App ─────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("welcome");
  const [name, setName] = useState("");
  const [grade, setGrade] = useState("8th Grade — Azul");
  const [themeIdx, setThemeIdx] = useState(0);
  const [tabIdx, setTabIdx] = useState(0);
  const [practiceCompleted, setPracticeCompleted] = useState({});
  const [workshopAnswers, setWorkshopAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [pdfBlob, setPdfBlob] = useState(null);
  const [scores, setScores] = useState([0,0,0]);
  const [telegramStatus, setTelegramStatus] = useState("not_configured");
  const [jsPDFReady, setJsPDFReady] = useState(false);
  const scrollRef = useRef(null);

  // Load jsPDF dynamically (avoids crossorigin CORS issues with static script tags)
  useEffect(()=>{
    if(window.jspdf){ setJsPDFReady(true); return; }
    const load = (url, onOk, onFail) => {
      const s = document.createElement("script");
      s.src = url;
      s.onload  = onOk;
      s.onerror = onFail;
      document.head.appendChild(s);
    };
    const primary  = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js";
    const fallback = "https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js";
    load(primary,
      () => setJsPDFReady(true),
      () => load(fallback, () => setJsPDFReady(true), () => console.error("jsPDF failed to load from both CDNs"))
    );
  },[]);

  // Scroll to top on tab change
  useEffect(()=>{
    if(scrollRef.current) scrollRef.current.scrollTop=0;
  },[themeIdx,tabIdx]);

  const handleSubmit = async () => {
    setSubmitting(true);
    const themeScores = WORKSHOP.map((qs,ti)=>scoreTheme(qs,workshopAnswers));
    setScores(themeScores);
    try {
      const doc = generatePDF(name, grade, workshopAnswers, themeScores);
      const blob = doc.output("blob");
      setPdfBlob(blob);

      // Send to Telegram
      if(TELEGRAM_BOT_TOKEN && TELEGRAM_CHAT_ID) {
        setTelegramStatus("sending");
        const result = await sendToTelegram(blob, name, grade);
        setTelegramStatus(result.ok ? "sent" : "failed");
      } else {
        setTelegramStatus("not_configured");
      }

      setSubmitted(true);
    } catch(e) {
      console.error("PDF generation error:", e);
      alert("Error generating PDF:\n" + (e && e.message ? e.message : String(e)));
    }
    setSubmitting(false);
  };

  if(screen==="welcome") return html`<${LoginScreen} onLogin=${(n,g)=>{setName(n);setGrade(g);setScreen("app");}}/>`;

  const themeObj = C.themes[themeIdx];
  const tabs = [
    {label:"📖 Learn",color:"#166534"},
    {label:"🎯 Practice",color:"#4338ca"},
    {label:"✝️ Biblical",color:"#b45309"},
    {label:"📝 Workshop",color:"#dc2626"},
  ];

  return html`<div style=${{minHeight:"100vh",background:"#f9fafb",fontFamily:C.sans}}>
    <!-- Hidden image for PDF -->
    <img id="img-brain-pdf" src="./img-brain-pdf.jpg" style=${{display:"none"}} alt=""/>

    <!-- Top nav -->
    <div style=${{background:"#1c1917",padding:"12px 16px",color:"#fafaf9",position:"sticky",top:0,zIndex:100}}>
      <div style=${{maxWidth:800,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <span style=${{fontSize:14,fontWeight:700}}>🔬 Science 8th</span>
          <span style=${{fontSize:11,color:"#a8a29e",marginLeft:8}}>${name}</span>
        </div>
        <span style=${{fontSize:11,color:"#78716c"}}>${grade}</span>
      </div>
    </div>

    <!-- Theme tabs -->
    <div style=${{background:"#fff",borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
      <div style=${{display:"flex",maxWidth:800,margin:"0 auto"}}>
        ${C.themes.slice(0,3).map((t,i)=>html`<button key=${i} onClick=${()=>{setThemeIdx(i);setTabIdx(0);setSubmitted(false);}}
          style=${{padding:"12px 14px",border:"none",borderBottom:themeIdx===i?`3px solid ${t.primary}`:"3px solid transparent",background:"transparent",fontSize:12,fontWeight:themeIdx===i?700:400,color:themeIdx===i?t.primary:C.muted,whiteSpace:"nowrap"}}>
          ${t.icon} ${t.name}
        </button>`)}
      </div>
    </div>

    <!-- Sub-tabs -->
    <div style=${{background:themeObj.light,padding:"8px 16px",borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
      <div style=${{display:"flex",gap:6,maxWidth:800,margin:"0 auto"}}>
        ${tabs.map((t,i)=>html`<button key=${i} onClick=${()=>setTabIdx(i)}
          style=${{padding:"7px 14px",border:tabIdx===i?`2px solid ${t.color}`:`1.5px solid ${C.border}`,borderRadius:20,background:tabIdx===i?"#fff":"transparent",fontSize:11,fontWeight:tabIdx===i?700:400,color:tabIdx===i?t.color:C.muted,whiteSpace:"nowrap"}}>
          ${t.label}
        </button>`)}
      </div>
    </div>

    <!-- Content -->
    <div ref=${scrollRef} style=${{maxWidth:800,margin:"0 auto",padding:"16px 16px 60px"}}>
      ${tabIdx===0&&html`<${LearnTab} themeIdx=${themeIdx} onNext=${()=>setTabIdx(1)}/>`}
      ${tabIdx===1&&html`<${PracticeTab} themeIdx=${themeIdx} completed=${practiceCompleted}
        onComplete=${id=>setPracticeCompleted(p=>({...p,[id]:true}))}
        onPrev=${()=>setTabIdx(0)} onNext=${()=>setTabIdx(2)}/>`}
      ${tabIdx===2&&html`<${BiblicalTab} themeIdx=${themeIdx} onPrev=${()=>setTabIdx(1)} onNext=${()=>setTabIdx(3)}/>`}
      ${tabIdx===3&&!submitted&&html`<${WorkshopTab} name=${name} grade=${grade}
        answers=${workshopAnswers} setAnswers=${setWorkshopAnswers}
        onSubmit=${handleSubmit} submitting=${submitting} pdfReady=${jsPDFReady}/>`}
      ${tabIdx===3&&submitted&&html`<${ResultsScreen} name=${name} grade=${grade}
        pdfBlob=${pdfBlob} scores=${scores} telegramStatus=${telegramStatus}
        onRetry=${()=>{setSubmitted(false);setWorkshopAnswers({});setPdfBlob(null);setScores([0,0,0]);setTelegramStatus("not_configured");}}/>`}
    </div>
  </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
